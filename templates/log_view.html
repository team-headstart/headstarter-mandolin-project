<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extraction Log</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding: 20px;
            background-color: #f8f9fa;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .log-section {
            margin-top: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 5px;
        }
        .log-section pre {
            margin: 0;
            white-space: pre-wrap;
        }
        .back-button {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="{{ url_for('index') }}" class="btn btn-primary back-button">← Back to Home</a>
        
        <h2 class="mb-4">Extraction Log</h2>
        
        <div class="log-section">
            <h4>Timestamp</h4>
            <p>{{ log_data.timestamp }}</p>
        </div>
        
        <div class="log-section">
            <h4>Source File</h4>
            <p>{{ log_data.source_file }}</p>
        </div>
        
        <div class="log-section">
            <h4>Template File</h4>
            <p>{{ log_data.template_file }}</p>
        </div>
        
        <div class="log-section">
            <h4>Extracted Data</h4>
            <pre>{{ log_data.extracted_data | tojson(indent=2) }}</pre>
        </div>
    </div>
</body>
</html>
